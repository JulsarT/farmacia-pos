version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: farmacia_postgres
    restart: always
    environment:
      POSTGRES_USER: farmacia_user
      POSTGRES_PASSWORD: farmacia_pass_2024
      POSTGRES_DB: farmacia_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: farmacia_redis
    restart: always
    ports:
      - '6379:6379'
    command: redis-server --requirepass redis_pass_2024
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
